name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'electron-app/**'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows-installer
          - os: macos-latest
            artifact: macos-installer
          - os: ubuntu-latest
            artifact: linux-installer
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.dmg
            electron-app/dist/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: downloaded
          pattern: '*-installer'
          merge-multiple: true

      - name: List downloaded files
        run: ls -la downloaded

      - name: Recreate "latest" release with fresh installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest downloaded/* \
            --title "YTMetrics Desktop — последняя сборка" \
            --notes "Автоматическая сборка десктоп-приложения. Ссылки ниже всегда ведут на самую свежую версию." \
            --prerelease
